<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rear Hub Analysis Tool</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-[#060d18] text-[#e2e8f0]">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo } = React;
    const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Cell } = Recharts;

    const WHEEL_SIZES = {
      '29"':   { erd: 600, label: '29" ISO 622' },
      '27.5"': { erd: 559, label: '27.5" ISO 584' },
      '26"':   { erd: 534, label: '26" ISO 559' },
    };

    const SPOKE_DIAMS = [1.5, 1.6, 1.7, 1.8, 1.9, 2.0, 2.1, 2.2];

    const mm_to_m = 1e-3;
    const kgf_to_N = 9.80665;
    const mm4_to_m4 = 1e-12;

    function makeWheel({ hub, rim, spokes_ds, spokes_nds }) {
      return { hub, rim, spokes_ds, spokes_nds };
    }

    function makeHub({ diameter_mm, width_ds_mm, width_nds_mm }) {
      return {
        diameter: diameter_mm * mm_to_m,
        width_ds: width_ds_mm * mm_to_m,
        width_nds: width_nds_mm * mm_to_m,
      };
    }

    function makeRim({ radius_mm, young_mod_pa, shear_mod_pa, I_rad_mm4, I_lat_mm4, J_tor_mm4 }) {
      return {
        radius: radius_mm * mm_to_m,
        young_mod: young_mod_pa,
        shear_mod: shear_mod_pa,
        section_type: "general",
        section_params: {
          area: 0,
          I_rad: I_rad_mm4 * mm4_to_m4,
          I_lat: I_lat_mm4 * mm4_to_m4,
          J_tor: J_tor_mm4 * mm4_to_m4,
          I_warp: 0,
        },
      };
    }

    function makeSpoke({ num, num_cross, diameter_mm, tension_N, offset_mm = 0, young_mod_pa = 210e9 }) {
      return {
        num,
        num_cross,
        diameter: diameter_mm * mm_to_m,
        tension: tension_N,
        offset: offset_mm * mm_to_m,
        young_mod: young_mod_pa,
      };
    }

    function ModeMatrix(wheel, N = 24) {
      const R = wheel.rim.radius;

      function spokeEA(spoke) {
        return spoke.young_mod * Math.PI * Math.pow(spoke.diameter / 2, 2);
      }

      function spokeGeometry(spoke) {
        const ns = Math.max(1, spoke.num / 2);
        const theta_cross = (2 * Math.PI * spoke.num_cross) / ns;
        return { ns, theta_cross };
      }

      function K_rim() {
        const rr = wheel.rim.section_params;
        const E = wheel.rim.young_mod;
        const G = wheel.rim.shear_mod;
        return {
          K_lat: E * rr.I_lat / Math.pow(R, 3),
          K_rad: E * rr.I_rad / Math.pow(R, 3),
          K_tor: G * rr.J_tor / Math.pow(R, 3),
        };
      }

      function spokeSide(spoke, flangeWidth, hubDiameter) {
        const { theta_cross } = spokeGeometry(spoke);
        const r_hub = hubDiameter / 2;
        const L = Math.sqrt(
          flangeWidth**2 +
          R**2 +
          r_hub**2 -
          2 * R * r_hub * Math.cos(theta_cross)
        );
        const sin_beta = flangeWidth / Math.max(L, 1e-12);
        const cos_beta = Math.sqrt(Math.max(0, 1 - sin_beta**2));
        const EA = spokeEA(spoke);

        return {
          L,
          sin_beta,
          cos_beta,
          EA,
          k_axial: EA / Math.max(L, 1e-12),
          k_lat: (spoke.tension / Math.max(L, 1e-12)) + (EA / Math.max(L, 1e-12)) * sin_beta**2,
          k_rad: (spoke.tension / Math.max(L, 1e-12)) + (EA / Math.max(L, 1e-12)) * cos_beta**2,
        };
      }

      function stiffness() {
        const Kr = K_rim({});
        const ds = spokeSide(wheel.spokes_ds, wheel.hub.width_ds, wheel.hub.diameter);
        const nds = spokeSide(wheel.spokes_nds, wheel.hub.width_nds, wheel.hub.diameter);

        const Nmode = N;
        const coeff = Math.PI / Math.pow(R, 3);

        const K_foundation_lat = (wheel.spokes_ds.num / 2) * ds.k_lat + (wheel.spokes_nds.num / 2) * nds.k_lat;
        const K_foundation_rad = (wheel.spokes_ds.num / 2) * ds.k_rad + (wheel.spokes_nds.num / 2) * nds.k_rad;

        let compliance_lat = 1 / Math.max(2 * K_foundation_lat, 1e-12);
        let compliance_rad = 1 / Math.max(2 * K_foundation_rad, 1e-12);

        for (let n = 1; n <= Nmode; n++) {
          const q = n * n;
          const lat_mode = coeff * (Kr.K_lat * Math.pow(q - 1, 2) + Kr.K_tor * (q - 1));
          const rad_mode = coeff * Kr.K_rad * Math.pow(q - 1, 2);
          compliance_lat += 1 / Math.max(K_foundation_lat + lat_mode, 1e-12);
          compliance_rad += 1 / Math.max(K_foundation_rad + rad_mode, 1e-12);
        }

        return {
          radial_stiffness: 1 / compliance_rad,
          lateral_stiffness: 1 / compliance_lat,
          torsional_stiffness: Kr.K_tor,
          K_foundation_lat,
          K_foundation_rad,
          ds,
          nds,
        };
      }

      function failureLoads() {
        const S = stiffness();
        const ds = S.ds;
        const nds = S.nds;

        const t_ds = wheel.spokes_ds.tension;
        const t_nds = wheel.spokes_nds.tension;

        const lateral_share_ds = Math.max(ds.k_axial * ds.sin_beta, 1e-12);
        const lateral_share_nds = Math.max(nds.k_axial * nds.sin_beta, 1e-12);

        const radial_share_ds = Math.max(ds.k_axial * ds.cos_beta * ds.cos_beta, 1e-12);
        const radial_share_nds = Math.max(nds.k_axial * nds.cos_beta * nds.cos_beta, 1e-12);

        const lateral_limit_ds = t_ds / lateral_share_ds;
        const lateral_limit_nds = t_nds / lateral_share_nds;
        const radial_limit_ds = t_ds / radial_share_ds;
        const radial_limit_nds = t_nds / radial_share_nds;

        const lat_N = Math.min(lateral_limit_ds, lateral_limit_nds);
        const rad_N = Math.min(radial_limit_ds, radial_limit_nds);

        return {
          F_lat_N: lat_N,
          F_rad_N: rad_N,
          F_lat_kgf: lat_N / kgf_to_N,
          F_rad_kgf: rad_N / kgf_to_N,
        };
      }

      function solve() {
        const S = stiffness();
        const F = failureLoads();
        return {
          ratio_pct: +((wheel.spokes_nds.tension / Math.max(wheel.spokes_ds.tension, 1e-12)) * 100).toFixed(1),
          symmetry_pct: +((Math.min(wheel.spokes_ds.tension, wheel.spokes_nds.tension) / Math.max(wheel.spokes_ds.tension, wheel.spokes_nds.tension)) * 100).toFixed(1),
          t_nds: +(wheel.spokes_nds.tension / kgf_to_N).toFixed(1),
          beta_ds: +(Math.asin(Math.min(S.ds.sin_beta, 0.999999)) * 180 / Math.PI).toFixed(2),
          beta_nds: +(Math.asin(Math.min(S.nds.sin_beta, 0.999999)) * 180 / Math.PI).toFixed(2),
          K_lat: +(S.lateral_stiffness / 1000).toFixed(1),
          K_rad: +(S.radial_stiffness / 1000).toFixed(0),
          F_lat_kgf: +F.F_lat_kgf.toFixed(1),
          F_rad_kgf: +F.F_rad_kgf.toFixed(1),
          L_ds_mm: +(S.ds.L / mm_to_m).toFixed(1),
          L_nds_mm: +(S.nds.L / mm_to_m).toFixed(1),
          ftf: +(wheel.hub.width_ds / mm_to_m + wheel.hub.width_nds / mm_to_m).toFixed(1),
          rim_offset_mm: wheel.rim.offset_mm || 0,
        };
      }

      return { wheel, stiffness, failureLoads, solve };
    }

    const PRESETS = [
      { id:'r142', short:'ISO 135/142', name:'CK ISO 135/142 Rear', OLD:142, type:'rear', d_ds:20.1, d_nds:33.9, pcd_ds:57.4, pcd_nds:57.4 },
      { id:'r148', short:'Boost 148', name:'CK Boost 148×12 Rear', OLD:148, type:'rear', d_ds:24.0, d_nds:36.3, pcd_ds:57.4, pcd_nds:57.4 },
      { id:'r157', short:'Superboost 157', name:'CK Superboost 157×12 Rear', OLD:157, type:'rear', d_ds:28.8, d_nds:42.3, pcd_ds:57.4, pcd_nds:57.4 },
      { id:'r157b', short:'Spank 150/157', name:'Spank 150/157 Rear', OLD:157, type:'rear', d_ds:29.5, d_nds:39.6, pcd_ds:58.0, pcd_nds:58.0 },
    ];

    const symCol = (sym) => {
      if (sym >= 90) return '#22c55e';
      if (sym >= 80) return '#84cc16';
      if (sym >= 70) return '#eab308';
      if (sym >= 60) return '#f97316';
      return '#ef4444';
    };

    function CrossSection({ hub_d_ds, hub_d_nds, pcd_ds, pcd_nds, OLD, width=320, compact=false, rimOffsetMm=0 }) {
      const H = compact ? 110 : 160;
      const CX = width / 2;
      const AY = compact ? 44 : 62;
      const FH = compact ? 16 : 26;
      const SC = Math.min(width / (Math.max(OLD || (hub_d_ds + hub_d_nds + 40), 80) + 20), 1.6);

      const dx = CX + hub_d_ds * SC;
      const nx = CX - hub_d_nds * SC;
      const rx = OLD ? CX + (OLD / 2) * SC : dx + 10;
      const lx = OLD ? CX - (OLD / 2) * SC : nx - 10;

      const rimVisualX = CX - rimOffsetMm * SC;
      const ds_eff = hub_d_ds + rimOffsetMm;
      const nds_eff = hub_d_nds - rimOffsetMm;
      const gid = `g${Math.random().toString(36).slice(2,7)}`;

      return (
        <svg width={width} height={H} style={{ display:'block', overflow:'visible' }}>
          <defs>
            <linearGradient id={`${gid}b`} x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stopColor="#1d4ed8" />
              <stop offset="50%" stopColor="#60a5fa" />
              <stop offset="100%" stopColor="#1d4ed8" />
            </linearGradient>
            <linearGradient id={`${gid}a`} x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stopColor="#92400e" />
              <stop offset="50%" stopColor="#fbbf24" />
              <stop offset="100%" stopColor="#92400e" />
            </linearGradient>
          </defs>

          <line x1={dx} y1={AY - pcd_ds * SC * 0.18} x2={rimVisualX} y2={compact ? 5 : 8} stroke="#f59e0b" strokeWidth={0.8} opacity={0.3}/>
          <line x1={nx} y1={AY - pcd_nds * SC * 0.18} x2={rimVisualX} y2={compact ? 5 : 8} stroke="#3b82f6" strokeWidth={0.8} opacity={0.3}/>
          <circle cx={rimVisualX} cy={compact ? 5 : 8} r={3} fill="none" stroke="#1e3050" strokeWidth={1}/>
          {!compact && <text x={rimVisualX + 8} y={12} fill="#1e3050" fontSize={7} fontFamily="monospace">{rimOffsetMm !== 0 ? 'RIM (OFFSET)' : 'RIM'}</text>}

          {OLD && <>
            <line x1={lx} y1={AY - FH - 10} x2={rx} y2={AY - FH - 10} stroke="#1e3050" strokeWidth={1}/>
            <line x1={lx} y1={AY - FH - 13} x2={lx} y2={AY - FH - 7} stroke="#1e3050" strokeWidth={1}/>
            <line x1={rx} y1={AY - FH - 13} x2={rx} y2={AY - FH - 7} stroke="#1e3050" strokeWidth={1}/>
            <text x={CX} y={AY - FH - 12} textAnchor="middle" fill="#2d4a6a" fontSize={compact ? 7 : 8} fontFamily="monospace">OLD {OLD}mm</text>
          </>}

          <line x1={lx - 5} y1={AY} x2={rx + 5} y2={AY} stroke="#1e3050" strokeWidth={2}/>
          <rect x={nx} y={AY - 5} width={Math.max(dx - nx, 1)} height={10} fill="#0a1620" stroke="#1e3050" strokeWidth={1}/>
          <rect x={lx - 6} y={AY - 14} width={6} height={28} fill="#142030" rx={1}/>
          <rect x={rx} y={AY - 14} width={6} height={28} fill="#142030" rx={1}/>
          <rect x={nx - 4} y={AY - FH} width={8} height={FH * 2} fill={`url(#${gid}b)`} rx={1}/>
          <rect x={dx - 4} y={AY - FH} width={8} height={FH * 2} fill={`url(#${gid}a)`} rx={1}/>

          {!compact && <>
            <text x={nx} y={AY - FH - 4} textAnchor="middle" fill="#60a5fa" fontSize={7} fontFamily="monospace">⌀{pcd_nds}</text>
            <text x={dx} y={AY - FH - 4} textAnchor="middle" fill="#fbbf24" fontSize={7} fontFamily="monospace">⌀{pcd_ds}</text>
          </>}

          <line x1={CX} y1={AY - FH} x2={CX} y2={AY + FH + 18} stroke="#1e3050" strokeWidth={1} strokeDasharray="3,2"/>

          <line x1={nx} y1={AY + FH + 5} x2={rimVisualX} y2={AY + FH + 5} stroke="#3b82f6" strokeWidth={1}/>
          <line x1={nx} y1={AY + FH + 2} x2={nx} y2={AY + FH + 8} stroke="#3b82f6" strokeWidth={1}/>
          <line x1={rimVisualX} y1={AY + FH + 2} x2={rimVisualX} y2={AY + FH + 8} stroke="#3b82f6" strokeWidth={1}/>
          <text x={(nx + rimVisualX) / 2} y={AY + FH + 17} textAnchor="middle" fill="#60a5fa" fontSize={compact ? 8 : 9} fontFamily="monospace">
            NDS {nds_eff.toFixed(1)}mm
          </text>

          <line x1={rimVisualX} y1={AY + FH + 5} x2={dx} y2={AY + FH + 5} stroke="#f59e0b" strokeWidth={1}/>
          <line x1={dx} y1={AY + FH + 2} x2={dx} y2={AY + FH + 8} stroke="#f59e0b" strokeWidth={1}/>
          <text x={(rimVisualX + dx) / 2} y={AY + FH + 17} textAnchor="middle" fill="#fbbf24" fontSize={compact ? 8 : 9} fontFamily="monospace">
            DS {ds_eff.toFixed(1)}mm
          </text>

          {!compact &&
            <text x={CX} y={H - 4} textAnchor="middle" fill="#2d4a6a" fontSize={7} fontFamily="monospace">
              F–F Total Span: {(hub_d_ds + hub_d_nds).toFixed(1)}mm
            </text>
          }
        </svg>
      );
    }

    const ChartTip = ({active, payload, label}) => {
      if (!active || !payload?.length) return null;
      return (
        <div style={{background:'#0b1826',border:'1px solid #1e3050',padding:'8px 12px',fontFamily:'monospace',fontSize:11}}>
          <p style={{color:'#5a80a0',margin:'0 0 4px',fontSize:10}}>{label}</p>
          {payload.map((p,i) => <p key={i} style={{color:p.fill||'#94a3b8',margin:'2px 0'}}>{p.name}: {p.value}</p>)}
        </div>
      );
    };

    function Slider({ label, value, min, max, step=0.1, unit='mm', color='#60a5fa', onChange }) {
      return (
        <div style={{marginBottom:10}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
            <span style={{fontFamily:'monospace',fontSize:10,color:'#5a80a0'}}>{label}</span>
            <span style={{fontFamily:'monospace',fontSize:11,color:color,fontWeight:'bold'}}>{value}{unit}</span>
          </div>
          <input type="range" min={min} max={max} step={step} value={value}
            onChange={e => onChange(+e.target.value)}
            style={{width:'100%',cursor:'pointer',accentColor:color}}/>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:8,color:'#2d4a6a',marginTop:1}}>
            <span>{min}{unit}</span><span>{max}{unit}</span>
          </div>
        </div>
      );
    }

    function MetricCard({ label, value, unit, color, sub }) {
      return (
        <div style={{background:'#0a1620',border:`1px solid ${color}33`,borderRadius:3,padding:'10px 14px',textAlign:'center'}}>
          <div style={{fontFamily:'monospace',fontSize:8,color:'#2d4a6a',letterSpacing:1,marginBottom:4}}>{label}</div>
          <div style={{fontFamily:'monospace',fontSize:20,color:color,fontWeight:'300',lineHeight:1}}>{value}</div>
          <div style={{fontFamily:'monospace',fontSize:9,color:'#2d4a6a',marginTop:2}}>{unit}</div>
          {sub && <div style={{fontFamily:'monospace',fontSize:8,color:color,marginTop:4,opacity:0.7}}>{sub}</div>}
        </div>
      );
    }

    function HubAnalysis() {
      const [tab, setTab] = useState('geo');
      const [wheelKey, setWheelKey] = useState('29"');
      const [presetId, setPresetId] = useState('r148');
      const [custom, setCustom] = useState(false);
      const [dDS, setDDS] = useState(24.0);
      const [dNDS, setDNDS] = useState(36.3);
      const [pcdDS, setPcdDS] = useState(57.4);
      const [pcdNDS, setPcdNDS] = useState(57.4);
      const [tDS, setTDS] = useState(100);
      const [nSpokes, setNSpokes] = useState(32);
      const [offsetRim, setOffsetRim] = useState(false);

      const erd = WHEEL_SIZES[wheelKey].erd;
      const rimOffsetMm = offsetRim ? 3.0 : 0.0;

      const activeBaseHub = custom
        ? { d_ds: dDS, d_nds: dNDS, pcd_ds: pcdDS, pcd_nds: pcdNDS, OLD: null, type: 'rear', name: 'Custom Hub' }
        : { ...PRESETS.find(p => p.id === presetId) };

      const d_ds_eff = activeBaseHub.d_ds + rimOffsetMm;
      const d_nds_eff = activeBaseHub.d_nds - rimOffsetMm;

      const wheel = useMemo(() => makeWheel({
        hub: makeHub({
          diameter_mm: activeBaseHub.pcd_ds,
          width_ds_mm: d_ds_eff,
          width_nds_mm: d_nds_eff
        }),
        rim: makeRim({
          radius_mm: erd / 2,
          young_mod_pa: 69e9,
          shear_mod_pa: 26e9,
          I_lat_mm4: 1500,
          I_rad_mm4: 3000,
          J_tor_mm4: 500
        }),
        spokes_ds: makeSpoke({
          num: nSpokes / 2,
          num_cross: 3,
          diameter_mm: 2.0,
          tension_N: tDS * kgf_to_N
        }),
        spokes_nds: makeSpoke({
          num: nSpokes / 2,
          num_cross: 3,
          diameter_mm: 2.0,
          tension_N: tDS * kgf_to_N * (d_ds_eff / Math.max(d_nds_eff, 1e-6)) * 0.75
        }),
      }), [activeBaseHub.pcd_ds, d_ds_eff, d_nds_eff, erd, nSpokes, tDS]);

      const mm = useMemo(() => ModeMatrix(wheel, 24), [wheel]);
      const solve = mm.solve();
      const st = mm.stiffness();

      const chartData = useMemo(() => {
        return PRESETS.map(p => {
          const d_ds = p.d_ds + rimOffsetMm;
          const d_nds = p.d_nds - rimOffsetMm;
          const wheelLocal = makeWheel({
            hub: makeHub({
              diameter_mm: p.pcd_ds,
              width_ds_mm: d_ds,
              width_nds_mm: d_nds
            }),
            rim: makeRim({
              radius_mm: erd / 2,
              young_mod_pa: 69e9,
              shear_mod_pa: 26e9,
              I_lat_mm4: 1500,
              I_rad_mm4: 3000,
              J_tor_mm4: 500
            }),
            spokes_ds: makeSpoke({
              num: nSpokes / 2,
              num_cross: 3,
              diameter_mm: 2.0,
              tension_N: tDS * kgf_to_N
            }),
            spokes_nds: makeSpoke({
              num: nSpokes / 2,
              num_cross: 3,
              diameter_mm: 2.0,
              tension_N: tDS * kgf_to_N * (d_ds / Math.max(d_nds, 1e-6)) * 0.75
            }),
          });
          const mmLocal = ModeMatrix(wheelLocal, 24);
          const s = mmLocal.solve();
          return {
            ...p,
            d_ds_display: d_ds,
            d_nds_display: d_nds,
            K_lat: +(s.K_lat).toFixed(1),
            K_rad: +(s.K_rad).toFixed(0),
            ratio_pct: +((d_nds / Math.max(d_ds, 1e-6)) * 100).toFixed(1),
            symmetry_pct: +((Math.min(d_ds, d_nds) / Math.max(d_ds, d_nds)) * 100).toFixed(1),
            F_lat_kgf: +s.F_lat_kgf.toFixed(1),
            F_rad_kgf: +s.F_rad_kgf.toFixed(1),
            isActive: !custom && p.id === presetId,
          };
        });
      }, [offsetRim, presetId, custom, erd, tDS, nSpokes, rimOffsetMm]);

      const BG = '#060d18';
      const CARD = '#0b1826';
      const BDR = '#1e3050';
      const GRN = '#2d9b5a';
      const rc = symCol(solve.symmetry_pct);

      const tabBtn = (id, label) => (
        <button key={id} onClick={()=>setTab(id)} style={{
          background:'none',border:'none',cursor:'pointer',padding:'10px 16px',
          fontFamily:'monospace',fontSize:9,letterSpacing:1.5,textTransform:'uppercase',
          color: tab===id ? '#60a5fa' : '#2d4a6a',
          borderBottom: tab===id ? '2px solid #3b82f6' : '2px solid transparent',
        }}>{label}</button>
      );

      return (
        <div style={{background:BG,minHeight:'100vh',fontFamily:'monospace',color:'#e2e8f0',fontSize:12}}>
          <div style={{background:'linear-gradient(180deg,#0b1e36,#060d18)',borderBottom:`1px solid ${BDR}`,padding:'18px 24px 14px'}}>
            <div style={{fontSize:9,color:'#3b82f6',letterSpacing:4,textTransform:'uppercase',marginBottom:4}}>
              Chris King MTB Hubs · Wheel Engineering Analysis · Ford Mode Matrix Terminology
            </div>
            <h1 style={{fontSize:20,fontWeight:300,margin:'0 0 4px',letterSpacing:2,color:'#f1f5f9'}}>
              REAR HUB STANDARDS &amp; WHEEL STRENGTH
            </h1>
            <p style={{margin:0,color:'#2d4a6a',fontSize:10}}>
              Geometry, tension, stiffness, and detension estimates with a 3mm rim offset toggle
            </p>
          </div>

          <div style={{background:'#080f1a',borderBottom:`1px solid ${BDR}`,padding:'14px 24px'}}>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit, minmax(180px, 1fr))',gap:'16px 24px',alignItems:'start'}}>
              <div>
                <div style={{fontSize:8,color:'#2d4a6a',letterSpacing:2,marginBottom:6}}>WHEEL SIZE</div>
                <div style={{display:'flex',gap:4}}>
                  {Object.entries(WHEEL_SIZES).map(([k]) => (
                    <button key={k} onClick={()=>setWheelKey(k)} style={{
                      background: wheelKey===k ? '#1e3a8a' : '#0a1620',
                      border: `1px solid ${wheelKey===k ? '#3b82f6' : BDR}`,
                      color: wheelKey===k ? '#60a5fa' : '#2d4a6a',
                      cursor:'pointer',padding:'4px 10px',fontFamily:'monospace',fontSize:9,borderRadius:2,
                    }}>{k}</button>
                  ))}
                </div>
              </div>

              <div>
                <div style={{fontSize:8,color:'#2d4a6a',letterSpacing:2,marginBottom:6}}>SPOKES</div>
                <div style={{display:'flex',gap:4}}>
                  {[28,32,36].map(n => (
                    <button key={n} onClick={()=>setNSpokes(n)} style={{
                      background: nSpokes===n ? '#1e3a8a' : '#0a1620',
                      border: `1px solid ${nSpokes===n ? '#3b82f6' : BDR}`,
                      color: nSpokes===n ? '#60a5fa' : '#2d4a6a',
                      cursor:'pointer',padding:'4px 10px',fontFamily:'monospace',fontSize:9,borderRadius:2,
                    }}>{n}H</button>
                  ))}
                </div>
              </div>

              <div>
                <div style={{fontSize:8,color:'#2d4a6a',letterSpacing:2,marginBottom:6}}>MODE</div>
                <div style={{display:'flex',gap:4}}>
                  {[['preset','PRESET'],['custom','CUSTOM']].map(([k,l]) => (
                    <button key={k} onClick={()=>setCustom(k==='custom')} style={{
                      background: (custom ? (k==='custom') : (k==='preset')) ? '#1e3a8a' : '#0a1620',
                      border: `1px solid ${(custom ? (k==='custom') : (k==='preset')) ? '#3b82f6' : BDR}`,
                      color: (custom ? (k==='custom') : (k==='preset')) ? '#60a5fa' : '#2d4a6a',
                      cursor:'pointer',padding:'4px 10px',fontFamily:'monospace',fontSize:9,borderRadius:2,
                    }}>{l}</button>
                  ))}
                </div>
              </div>

              <div>
                <div style={{fontSize:8,color:'#2d4a6a',letterSpacing:2,marginBottom:6}}>3MM OFFSET RIM</div>
                <button onClick={() => setOffsetRim(!offsetRim)} style={{
                  background: offsetRim ? '#166534' : '#0a1620',
                  border: `1px solid ${offsetRim ? '#22c55e' : BDR}`,
                  color: offsetRim ? '#4ade80' : '#4a6a8a',
                  cursor: 'pointer',
                  padding: '6px 12px',
                  fontFamily: 'monospace',
                  fontSize: 9,
                  borderRadius: 2,
                  width: '100%',
                  fontWeight: offsetRim ? 'bold' : 'normal',
                  textAlign: 'center'
                }}>
                  {offsetRim ? '✓ Enabled' : 'Disabled'}
                </button>
              </div>

              <div>
                <Slider label="DS Reference Tension" value={tDS} min={60} max={130} step={1} unit=" kgf" color="#fbbf24" onChange={setTDS}/>
              </div>

              <div>
                {!custom ? (
                  <>
                    <div style={{fontSize:8,color:'#2d4a6a',letterSpacing:2,marginBottom:6}}>HUB PRESET</div>
                    <select value={presetId} onChange={e=>setPresetId(e.target.value)} style={{
                      background:'#0a1620',border:`1px solid ${BDR}`,color:'#60a5fa',
                      fontFamily:'monospace',fontSize:9,padding:'5px 8px',width:'100%',cursor:'pointer',
                    }}>
                      {PRESETS.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                    </select>
                  </>
                ) : (
                  <>
                    <Slider label="Center-to-DS Flange (d_DS)" value={dDS} min={5} max={65} color="#fbbf24" onChange={v=>{setDDS(v);setCustom(true);}}/>
                    <Slider label="DS Flange PCD" value={pcdDS} min={30} max={100} color="#fbbf24" onChange={setPcdDS}/>
                  </>
                )}
              </div>

              {custom && (
                <div>
                  <Slider label="Center-to-NDS Flange (d_NDS)" value={dNDS} min={5} max={65} color="#60a5fa" onChange={v=>{setDNDS(v);setCustom(true);}}/>
                  <Slider label="NDS Flange PCD" value={pcdNDS} min={30} max={100} color="#60a5fa" onChange={setPcdNDS}/>
                </div>
              )}
            </div>
          </div>

          <div style={{display:'flex',borderBottom:`1px solid ${BDR}`,background:'#080f1a'}}>
            {tabBtn('geo', '01  Geometry')}
            {tabBtn('strength', '02  Strength')}
            {tabBtn('table', '03  Data')}
          </div>

          <div style={{maxWidth:1280,margin:'0 auto',padding:'20px 24px 48px'}}>
            {tab === 'geo' && (
              <div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit, minmax(320px, 1fr))',gap:20,marginBottom:20}}>
                  <div style={{background:CARD,border:`1px solid ${BDR}`,borderRadius:3,padding:16}}>
                    <div style={{fontSize:9,color:'#3b82f6',letterSpacing:2,marginBottom:8}}>ACTIVE HUB — LIVE GEOMETRY</div>
                    <div style={{fontFamily:'monospace',fontSize:11,color:'#5a80a0',marginBottom:12}}>
                      {custom ? 'Custom Hub' : PRESETS.find(p => p.id === presetId).name} {offsetRim ? '(3mm Offset Active)' : ''}
                    </div>
                    <CrossSection
                      hub_d_ds={custom ? dDS : PRESETS.find(p => p.id === presetId).d_ds}
                      hub_d_nds={custom ? dNDS : PRESETS.find(p => p.id === presetId).d_nds}
                      pcd_ds={custom ? pcdDS : PRESETS.find(p => p.id === presetId).pcd_ds}
                      pcd_nds={custom ? pcdNDS : PRESETS.find(p => p.id === presetId).pcd_nds}
                      OLD={custom ? null : PRESETS.find(p => p.id === presetId).OLD}
                      width={380}
                      rimOffsetMm={rimOffsetMm}
                    />
                    <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginTop:14}}>
                      <MetricCard label="TENSION SYMMETRY" value={solve.symmetry_pct} unit="%" color={rc}/>
                      <MetricCard label="FLANGE SPAN" value={solve.ftf} unit="mm" color="#38bdf8"/>
                      <MetricCard label="NDS TENSION" value={solve.t_nds} unit="kgf" color="#a78bfa" />
                    </div>
                    <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:8,marginTop:8}}>
                      <MetricCard label="β DS BRACING" value={solve.beta_ds} unit="deg" color="#fbbf24"/>
                      <MetricCard label="β NDS BRACING" value={solve.beta_nds} unit="deg" color="#60a5fa"/>
                    </div>
                  </div>

                  <div style={{display:'flex',flexDirection:'column',gap:12}}>
                    <div style={{background:CARD,border:`1px solid ${BDR}`,borderRadius:3,padding:14}}>
                      <div style={{fontSize:9,color:GRN,letterSpacing:2,marginBottom:8}}>MODEL NOTES</div>
                      <div style={{fontSize:10,color:'#2d4a6a',lineHeight:1.8}}>
                        <div><strong>Stiffness</strong> is computed separately from <strong>failure load</strong>.</div>
                        <div><strong>Failure load</strong> is the smaller of DS/NDS detension thresholds.</div>
                        <div><strong>Offset</strong> only changes geometry, not hub presets.</div>
                        <div><strong>Wheel size</strong> affects spoke geometry through ERD.</div>
                      </div>
                    </div>

                    <div style={{background:CARD,border:`1px solid ${BDR}`,borderRadius:3,padding:14}}>
                      <div style={{fontSize:9,color:'#2d4a6a',letterSpacing:2,marginBottom:8}}>TENSION BALANCE</div>
                      <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                        <span style={{fontSize:9,color:'#2d4a6a'}}>Symmetry %</span>
                        <span style={{fontSize:12,color:rc,fontWeight:'bold'}}>{solve.symmetry_pct}%</span>
                      </div>
                      <div style={{background:'#060d18',height:12,borderRadius:2,position:'relative',marginBottom:4}}>
                        <div style={{position:'absolute',left:0,top:0,bottom:0,width:`${solve.symmetry_pct}%`,background:rc,borderRadius:2}}/>
                      </div>
                      <div style={{fontSize:9,color:'#4a6a8a',marginTop:6}}>NDS/DS Absolute Ratio: {solve.ratio_pct}%</div>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {tab === 'strength' && (
              <div>
                <div style={{background:CARD,border:`1px solid ${BDR}`,padding:'14px 18px',borderRadius:3,marginBottom:16}}>
                  <div style={{fontSize:9,color:GRN,letterSpacing:2,marginBottom:10}}>MODEL OUTPUTS</div>
                  <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit, minmax(150px, 1fr))',gap:10}}>
                    <MetricCard label="LATERAL DETENSION LIMIT" value={solve.F_lat_kgf} unit="kgf" color="#f59e0b" sub="Lower load to slacken weakest spoke"/>
                    <MetricCard label="RADIAL DETENSION LIMIT" value={solve.F_rad_kgf} unit="kgf" color="#a78bfa" sub="Lower load to slacken weakest spoke"/>
                    <MetricCard label="LATERAL STIFFNESS" value={solve.K_lat} unit="N/mm" color="#38bdf8" sub="Wheel resistance to side load"/>
                    <MetricCard label="RADIAL STIFFNESS" value={solve.K_rad} unit="N/mm" color="#4ade80" sub="Wheel resistance to vertical load"/>
                  </div>
                </div>

                <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit, minmax(300px, 1fr))',gap:12}}>
                  <div style={{background:CARD,border:`1px solid ${BDR}`,padding:14,borderRadius:3}}>
                    <div style={{fontSize:9,color:'#a78bfa',letterSpacing:2,marginBottom:10}}>RADIAL DETENSION LIMIT (kgf)</div>
                    <ResponsiveContainer width="100%" height={220}>
                      <BarChart data={chartData} margin={{top:10,right:10,bottom:40,left:0}}>
                        <CartesianGrid strokeDasharray="3,3" stroke="#0d1e33"/>
                        <XAxis dataKey="short" tick={{fill:'#4a6a8a',fontSize:8}} angle={-30} textAnchor="end"/>
                        <YAxis tick={{fill:'#4a6a8a',fontSize:9}}/>
                        <Tooltip content={<ChartTip/>}/>
                        <Bar dataKey="F_rad_kgf">
                          {chartData.map((d,i)=><Cell key={i} fill={d.isActive ? '#a78bfa' : '#3d5a80'}/>)}
                        </Bar>
                      </BarChart>
                    </ResponsiveContainer>
                  </div>

                  <div style={{background:CARD,border:`1px solid ${BDR}`,padding:14,borderRadius:3}}>
                    <div style={{fontSize:9,color:'#f59e0b',letterSpacing:2,marginBottom:10}}>LATERAL DETENSION LIMIT (kgf)</div>
                    <ResponsiveContainer width="100%" height={220}>
                      <BarChart data={chartData} margin={{top:10,right:10,bottom:40,left:0}}>
                        <CartesianGrid strokeDasharray="3,3" stroke="#0d1e33"/>
                        <XAxis dataKey="short" tick={{fill:'#4a6a8a',fontSize:8}} angle={-30} textAnchor="end"/>
                        <YAxis tick={{fill:'#4a6a8a',fontSize:9}}/>
                        <Tooltip content={<ChartTip/>}/>
                        <Bar dataKey="F_lat_kgf">
                          {chartData.map((d,i)=><Cell key={i} fill={d.isActive ? '#f59e0b' : '#3d5a80'}/>)}
                        </Bar>
                      </BarChart>
                    </ResponsiveContainer>
                  </div>
                </div>
              </div>
            )}

            {tab === 'table' && (
              <div style={{overflowX:'auto',background:CARD,border:`1px solid ${BDR}`,padding:12,borderRadius:3}}>
                <table style={{width:'100%',borderCollapse:'collapse',fontSize:10,textAlign:'left'}}>
                  <thead>
                    <tr style={{borderBottom:`1px solid ${BDR}`,color:'#5a80a0'}}>
                      <th style={{padding:6}}>Rear Hub Standard</th>
                      <th style={{padding:6}}>Effective d_DS</th>
                      <th style={{padding:6}}>Effective d_NDS</th>
                      <th style={{padding:6}}>Symmetry</th>
                      <th style={{padding:6}}>Lateral K (N/mm)</th>
                      <th style={{padding:6}}>Lat Detension limit</th>
                      <th style={{padding:6}}>Rad Detension limit</th>
                    </tr>
                  </thead>
                  <tbody>
                    {chartData.map(h => (
                      <tr key={h.id} style={{borderBottom:'1px solid #0d1826',background:h.isActive ? '#0d1e33' : 'transparent'}}>
                        <td style={{padding:6,fontWeight:h.isActive ? 'bold' : 'normal'}}>{h.name}</td>
                        <td style={{padding:6,color:'#fbbf24'}}>{h.d_ds_display.toFixed(1)}mm</td>
                        <td style={{padding:6,color:'#60a5fa'}}>{h.d_nds_display.toFixed(1)}mm</td>
                        <td style={{padding:6,color:symCol(h.symmetry_pct),fontWeight:'bold'}}>{h.symmetry_pct}%</td>
                        <td style={{padding:6}}>{h.K_lat}</td>
                        <td style={{padding:6,color:'#f59e0b'}}>{h.F_lat_kgf}kgf</td>
                        <td style={{padding:6,color:'#a78bfa'}}>{h.F_rad_kgf}kgf</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}

            <div style={{marginTop:40,borderTop:`1px solid #0d1826`,paddingTop:12,fontSize:8,color:'#3d5a80',lineHeight:2}}>
              <strong>Math Model:</strong> Analytical approximation using geometry-driven detension and rim/spoke stiffness. <br/>
              <strong>Offset Convention:</strong> Rear-wheel asymmetric rim shifts the rim bed toward the NDS by 3mm, so effective DS span increases and effective NDS span decreases. <br/>
              <strong>Interpretation:</strong> Smaller wheels should generally come out a bit stiffer because of ERD-driven geometry.
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<HubAnalysis />);
  </script>
</body>
</html>
